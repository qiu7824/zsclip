name: Native Hosts

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/native-hosts.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "scripts/native-host-smoke-linux.sh"
      - "scripts/native-host-smoke-macos.sh"
      - "src/**"
      - "docs/native-host-verification.md"
      - "docs/ui-host-porting.md"
      - "docs/macos-ui.md"
  pull_request:
    paths:
      - ".github/workflows/native-hosts.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "scripts/native-host-smoke-linux.sh"
      - "scripts/native-host-smoke-macos.sh"
      - "src/**"
      - "docs/native-host-verification.md"
      - "docs/ui-host-porting.md"
      - "docs/macos-ui.md"

jobs:
  macos-appkit:
    name: macOS AppKit host
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Check AppKit host
        env:
          RUSTFLAGS: -A warnings
        run: |
          set +e
          cargo check --bin zsclip 2>&1 | tee cargo-check-macos.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message="$(tail -n 120 cargo-check-macos.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=macOS cargo check failed::$message"
            exit "$status"
          fi
      - name: Check smoke script syntax
        run: bash -n scripts/native-host-smoke-macos.sh
      - name: Run AppKit smoke
        env:
          NATIVE_HOST_SMOKE_WAIT: "5"
          ZSCLIP_NATIVE_HOST_AUTO_SMOKE: "1"
        run: bash scripts/native-host-smoke-macos.sh
      - name: Upload AppKit smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-host-smoke-macos
          path: target/native-host-smoke/macos/
          if-no-files-found: warn

  linux-gtk:
    name: Linux GTK host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            libdbus-1-dev \
            libgtk-4-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            pkg-config \
            scrot \
            xvfb
      - name: Check GTK host
        env:
          RUSTFLAGS: -A warnings
        run: |
          set +e
          cargo check --bin zsclip 2>&1 | tee cargo-check-linux.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message="$(tail -n 120 cargo-check-linux.log)"
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=Linux cargo check failed::$message"
            exit "$status"
          fi
      - name: Check smoke script syntax
        run: bash -n scripts/native-host-smoke-linux.sh
      - name: Run GTK smoke under Xvfb
        env:
          NATIVE_HOST_SMOKE_WAIT: "5"
          ZSCLIP_NATIVE_HOST_AUTO_SMOKE: "1"
        run: xvfb-run -a bash scripts/native-host-smoke-linux.sh
      - name: Upload GTK smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-host-smoke-linux
          path: target/native-host-smoke/linux/
          if-no-files-found: warn
