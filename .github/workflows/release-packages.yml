name: Release Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build"
        required: false
        default: "0.9.9"
  push:
    branches:
      - main
    tags:
      - "0.*"

permissions:
  contents: read

jobs:
  windows:
    name: Windows release package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Windows release
        run: cargo build --release --locked
      - name: Stage Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\zsclip.exe dist\zsclip-windows-x86_64.exe
      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: zsclip-windows-x86_64
          path: dist/zsclip-windows-x86_64.exe
          if-no-files-found: error

  macos:
    name: macOS release package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS release
        env:
          CARGO_TERM_COLOR: never
          RUSTFLAGS: -A warnings
        run: |
          set +e
          cargo build --release --locked 2>&1 | tee cargo-build-macos.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message="$(grep -n -B 3 -A 12 -E 'error(\[[A-Z0-9]+\])?:|could not compile|cannot find|mismatched types|no method named' cargo-build-macos.log | tail -n 200)"
            if [ -z "$message" ]; then
              message="$(tail -n 160 cargo-build-macos.log)"
            fi
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=macOS cargo build failed::$message"
            exit "$status"
          fi
      - name: Stage macOS binary
        run: |
          mkdir -p dist
          cp target/release/zsclip dist/zsclip-macos
      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: zsclip-macos
          path: dist/zsclip-macos
          if-no-files-found: error

  linux:
    name: Linux release package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            libdbus-1-dev \
            libgtk-4-dev \
            libx11-dev \
            libxi-dev \
            libxtst-dev \
            pkg-config
      - name: Build Linux release
        env:
          CARGO_TERM_COLOR: never
          RUSTFLAGS: -A warnings
        run: |
          set +e
          cargo build --release --locked 2>&1 | tee cargo-build-linux.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message="$(grep -n -B 3 -A 12 -E 'error(\[[A-Z0-9]+\])?:|could not compile|cannot find|mismatched types|no method named' cargo-build-linux.log | tail -n 200)"
            if [ -z "$message" ]; then
              message="$(tail -n 160 cargo-build-linux.log)"
            fi
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=Linux cargo build failed::$message"
            exit "$status"
          fi
      - name: Stage Linux binary
        run: |
          mkdir -p dist
          cp target/release/zsclip dist/zsclip-linux-x86_64
      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: zsclip-linux-x86_64
          path: dist/zsclip-linux-x86_64
          if-no-files-found: error
